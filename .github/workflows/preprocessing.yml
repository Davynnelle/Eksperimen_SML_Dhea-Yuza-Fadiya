name: Automated Preprocessing Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'preprocessing/automate_Dhea-Yuza-Fadiya.py'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: preprocessing-pipeline
  cancel-in-progress: true

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas==2.2.0 numpy==1.26.4 scikit-learn==1.4.0 joblib==1.3.2

      - name: Download dataset from Kaggle
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          pip install kaggle
          mkdir -p wildfire_data
          kaggle datasets download \
            -d sarcasmos/nasa-firms-multi-sensor-global-wildfire-detections \
            -p wildfire_data \
            --unzip

      - name: Run preprocessing pipeline
        run: |
              python preprocessing/automate_Dhea-Yuza-Fadiya.py \
                --input_dir wildfire_data \
                --output_dir preprocessing/wildfire_preprocessing

      - name: Commit preprocessed data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update preprocessed dataset [skip ci]"
          file_pattern: "preprocessing/wildfire_preprocessing/*"